<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVILA™ | War Room - Link Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid #1e293b; }
        .glow-input:focus { box-shadow: 0 0 15px rgba(37, 99, 235, 0.3); border-color: #3b82f6; }
        
        /* Custom Scrollbar for Table */
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="w-full max-w-5xl mx-auto">

    <div class="w-full glass-panel rounded-3xl p-8 shadow-2xl mb-8">
        <div class="flex items-center justify-between border-b border-slate-800 pb-6 mb-8">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-blue-500 uppercase">Invila™ War Room</h1>
                <p class="text-xs font-bold text-slate-500 tracking-widest mt-1">SMART LINK GENERATOR & PROSPECT TRACKER</p>
            </div>
            <div class="text-right">
                <span class="inline-block px-3 py-1 bg-red-500/10 text-red-500 border border-red-500/20 rounded-full text-[10px] font-black uppercase tracking-widest">Live Ops</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="space-y-4">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Target Identity</h3>
                
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1">Nama Perusahaan (Client)</label>
                    <input type="text" id="gen_company" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white glow-input outline-none transition-all" placeholder="PT Hassia Pacific">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1">Alamat Lengkap</label>
                    <textarea id="gen_addr" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white glow-input outline-none transition-all h-20 resize-none" placeholder="Masukkan alamat untuk surat penawaran..."></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">Nama Target</label>
                        <input type="text" id="gen_name" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white glow-input outline-none transition-all" placeholder="Nama PIC">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">No. WA Target (Internal)</label>
                        <input type="text" id="gen_phone" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white glow-input outline-none transition-all" placeholder="081234...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1">Jabatan (Role)</label>
                    <input type="text" id="gen_role" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white glow-input outline-none transition-all" placeholder="CFO / FM / Kosongkan">
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Routing & Security Protocol</h3>
                
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1">Tampilan Tujuan (Routing)</label>
                    <select id="gen_view" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white glow-input outline-none">
                        <option value="technical">TECHNICAL VIEW (Fokus SCADA / FM)</option>
                        <option value="executive">EXECUTIVE VIEW (Fokus Finansial / CFO)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1">Masa Berlaku Tautan</label>
                    <select id="gen_expire" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white glow-input outline-none">
                        <option value="24">24 Jam (Urgent)</option>
                        <option value="48" selected>48 Jam (Standar)</option>
                        <option value="168">7 Hari (Long-Term)</option>
                    </select>
                </div>
            </div>
        </div>

        <button onclick="generateAndSaveLink()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-[0.2em] text-xs py-4 rounded-xl shadow-lg transition-all active:scale-95 mb-8">
            Inject Parameters & Generate Link
        </button>

        <div id="result_area" class="hidden border-t border-slate-800 pt-6">
            <h3 class="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-3">Encrypted Payload Ready</h3>
            <div class="flex items-center gap-3">
                <input type="text" id="final_link" readonly class="w-full bg-black/50 border border-emerald-900/50 rounded-xl p-4 text-xs font-mono text-emerald-400 outline-none">
                <button onclick="copyCurrentLink()" id="btn_copy" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs py-4 px-6 rounded-xl transition-all">COPY</button>
            </div>
        </div>
    </div>

    <div class="w-full glass-panel rounded-3xl p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xs font-black text-[#d4af37] uppercase tracking-widest">Prospect & Link Database</h3>
            <button onclick="clearHistory()" class="text-[10px] uppercase font-bold text-red-500 hover:text-red-400 transition-all border border-red-500/30 px-3 py-1 rounded-md">
                Clear Data
            </button>
        </div>
        
        <div class="overflow-x-auto">
            <table class="w-full text-left text-xs text-slate-300 border-collapse">
                <thead class="bg-slate-900 text-slate-500 uppercase text-[10px] tracking-wider">
                    <tr>
                        <th class="p-4 rounded-tl-xl border-b border-slate-700">Tgl Dibuat</th>
                        <th class="p-4 border-b border-slate-700">Perusahaan</th>
                        <th class="p-4 border-b border-slate-700">Target (Role) & WA</th>
                        <th class="p-4 border-b border-slate-700">Routing Mode</th>
                        <th class="p-4 border-b border-slate-700">Status Expire</th>
                        <th class="p-4 rounded-tr-xl border-b border-slate-700">Aksi</th>
                    </tr>
                </thead>
                <tbody id="history_table">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // URL Master Gateway
        const BASE_URL = "https://invilawatertreatment-blip.github.io/fase-1-fondasi-teknologi-the-strategic-engine/gateway/index.html";
        
        // --- NEW WEBHOOK URL GOOGLE SPREADSHEET ---
        const GAS_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbydM-DSo_m53W8vGw2kVSaj-9WxpBQEyYWMkBJDl6wauE_brD78K5LPhfJdcTDDEvb-/exec";

        window.onload = renderHistory;

        function generateAndSaveLink() {
            const company = document.getElementById('gen_company').value.trim();
            const addr = document.getElementById('gen_addr').value.trim();
            const name = document.getElementById('gen_name').value.trim();
            const phone = document.getElementById('gen_phone').value.trim();
            const role = document.getElementById('gen_role').value.trim();
            const view = document.getElementById('gen_view').value;
            const expireHours = parseInt(document.getElementById('gen_expire').value);

            if (!company) { alert("Nama Perusahaan wajib diisi!"); return; }

            // Sanitasi parameter
            const safeCompany = encodeURIComponent(company.replace(/\s+/g, '_'));
            const safeAddr = encodeURIComponent(addr.replace(/\s+/g, '_'));
            const safeName = encodeURIComponent(name.replace(/\s+/g, '_'));
            const safeRole = encodeURIComponent(role.replace(/\s+/g, '_'));
            const safePhone = encodeURIComponent(phone);
            
            // Generate Waktu Expire & Token Rahasia
            const expireTime = Date.now() + (expireHours * 60 * 60 * 1000);
            const token = Math.random().toString(36).substr(2, 10);
            
            // Susun Tautan Klien (PENTING: phone tidak dimasukkan ke dalam link klien)
            const finalUrl = `${BASE_URL}?view=${view}&client=${safeCompany}&addr=${safeAddr}&nama=${safeName}&role=${safeRole}&token=${token}&expire=${expireTime}`;

            // 1. Tampilkan Tautan di Layar
            document.getElementById('final_link').value = finalUrl;
            document.getElementById('result_area').classList.remove('hidden');
            document.getElementById('btn_copy').innerText = "COPY";

            // 2. Simpan Data ke Tabel Lokal (Termasuk Nomor HP)
            saveToDatabase({
                dateStr: new Date().toLocaleString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }),
                company: company,
                target: name || "-",
                phone: phone || "-",
                role: role || "-",
                view: view,
                expireTime: expireTime,
                link: finalUrl
            });

            // 3. TEMBAK DATA KE GOOGLE SPREADSHEET (Markas Pusat) - Membawa parameter phone
            const radarUrl = `${GAS_WEBHOOK_URL}?company=${safeCompany}&nama=${safeName}&phone=${safePhone}&role=${safeRole}&action=GENERATE%20LINK&link=${encodeURIComponent(finalUrl)}`;
            fetch(radarUrl, { mode: 'no-cors' })
                .then(() => console.log("[War Room] Data tersinkronisasi ke Markas Invila."))
                .catch(e => console.log("[War Room] Gagal sinkronisasi ke Markas:", e));
            
            // Kosongkan sebagian form agar mudah dipakai lagi
            document.getElementById('gen_name').value = "";
            document.getElementById('gen_phone').value = "";
            document.getElementById('gen_role').value = "";
        }

        function copyCurrentLink() {
            const linkInput = document.getElementById('final_link');
            linkInput.select();
            navigator.clipboard.writeText(linkInput.value);
            document.getElementById('btn_copy').innerText = "COPIED!";
        }

        function copyFromHistory(link, btnElement) {
            navigator.clipboard.writeText(link);
            const originalText = btnElement.innerText;
            btnElement.innerText = "COPIED!";
            btnElement.classList.replace('bg-blue-600', 'bg-emerald-600');
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.classList.replace('bg-emerald-600', 'bg-blue-600');
            }, 2000);
        }

        // --- MANAJEMEN DATABASE LOCAL STORAGE ---
        function saveToDatabase(prospectData) {
            let history = JSON.parse(localStorage.getItem('invila_prospects')) || [];
            history.unshift(prospectData); 
            localStorage.setItem('invila_prospects', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('invila_prospects')) || [];
            const tbody = document.getElementById('history_table');
            tbody.innerHTML = '';

            if(history.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-6 text-center text-slate-500 italic">Belum ada data prospek. Generate link pertama Anda!</td></tr>`;
                return;
            }

            history.forEach((item) => {
                const isExpired = Date.now() > item.expireTime;
                const statusBadge = isExpired 
                    ? `<span class="bg-red-500/10 text-red-500 border border-red-500/20 px-2 py-1 rounded text-[9px] uppercase font-bold">Expired</span>` 
                    : `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-1 rounded text-[9px] uppercase font-bold">Active</span>`;
                
                const viewBadge = item.view === 'executive' 
                    ? `<span class="text-[#d4af37] font-bold">Executive</span>`
                    : `<span class="text-blue-400 font-bold">Technical</span>`;

                // Tampilan role dan phone di tabel
                const phoneDisplay = item.phone !== "-" ? `<br><span class="text-emerald-400 font-mono text-[10px]">WA: ${item.phone}</span>` : "";

                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-800 hover:bg-slate-800/40 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 whitespace-nowrap text-slate-400">${item.dateStr}</td>
                    <td class="p-4 font-black text-white">${item.company}</td>
                    <td class="p-4">${item.target} <span class="text-slate-500 font-medium">(${item.role})</span> ${phoneDisplay}</td>
                    <td class="p-4 uppercase text-[10px]">${viewBadge}</td>
                    <td class="p-4">${statusBadge}</td>
                    <td class="p-4">
                        <button onclick="copyFromHistory('${item.link}', this)" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2 rounded-lg text-[10px] uppercase font-black tracking-wider transition-all shadow-lg">Copy Link</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function clearHistory() {
            if(confirm("PERINGATAN: Anda yakin ingin menghapus seluruh riwayat prospek dari perangkat ini? Data yang terhapus tidak bisa dikembalikan.")) {
                localStorage.removeItem('invila_prospects');
                renderHistory();
            }
        }
    </script>
</body>
</html>
