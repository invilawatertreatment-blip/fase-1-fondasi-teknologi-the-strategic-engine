<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invila™ | The War Room (Link Generator)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { luxuryNavy: '#0A192F', brandGold: '#C5A059', successGreen: '#10b981', legacyRed: '#f43f5e' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A192F; color: #e2e8f0; }
        .bg-grid-slate { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px); }
        .glass-panel { background: rgba(17, 34, 64, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        input, select { background: #081221; border: 1px solid #334155; color: white; padding: 10px 15px; border-radius: 8px; width: 100%; outline: none; transition: all 0.3s; font-family: 'JetBrains Mono', monospace; }
        input:focus, select:focus { border-color: #C5A059; box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }
        label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; margin-bottom: 5px; display: block; }
    </style>
</head>
<body class="bg-grid-slate min-h-screen py-10 px-4 font-sans flex items-center justify-center">

    <div class="max-w-4xl w-full glass-panel p-8 rounded-2xl relative overflow-hidden">
        <div class="border-b border-white/10 pb-6 mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-white tracking-widest uppercase">INVILA<sup class="text-xs">™</sup> WAR ROOM</h1>
                <p class="text-xs text-brandGold tracking-widest font-mono mt-1">STRATEGIC LINK GENERATOR V4.0</p>
            </div>
            <div class="bg-legacyRed/10 border border-legacyRed px-3 py-1 rounded text-[9px] font-bold text-legacyRed uppercase tracking-widest animate-pulse">
                Strictly Confidential
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <h3 class="text-sm font-bold text-brandGold uppercase tracking-widest border-b border-white/5 pb-2">1. Target Intelligence</h3>
                
                <div>
                    <label>Nama Perusahaan Klien</label>
                    <input type="text" id="gen-client" placeholder="Contoh: PT Mayora Indah Tbk">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Attention To (Nama)</label>
                        <input type="text" id="gen-nama" placeholder="Contoh: Bpk Budi">
                    </div>
                    <div>
                        <label>Jabatan (Role)</label>
                        <input type="text" id="gen-role" placeholder="Contoh: Plant Manager">
                    </div>
                </div>
                <div>
                    <label>Mode Tampilan Awal (Persona)</label>
                    <select id="gen-view" class="text-brandGold font-bold">
                        <option value="technical">FM SCADA VIEW (Biru - Target Engineer)</option>
                        <option value="executive">CFO STRATEGIC DESK (Emas - Target Direksi)</option>
                    </select>
                </div>
                <div>
                    <label class="text-legacyRed">Time-Bomb (Waktu Kedaluwarsa Link)</label>
                    <select id="gen-expire" class="border-legacyRed/50 text-legacyRed">
                        <option value="48">48 Jam (Sangat Direkomendasikan)</option>
                        <option value="24">24 Jam (Sangat Mendesak)</option>
                        <option value="168">7 Hari (Standar)</option>
                        <option value="0">Jangan Pernah Kedaluwarsa (Bahaya)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-sm font-bold text-brandGold uppercase tracking-widest border-b border-white/5 pb-2">2. Baseline Parameters</h3>
                
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Volume (m³/Hari)</label><input type="number" id="gen-flow" value="1500"></div>
                    <div><label>Siklus (Hari/Bln)</label><input type="number" id="gen-days" value="24"></div>
                    <div><label>Tarif PDAM (Rp)</label><input type="number" id="gen-pdam" value="14500"></div>
                    <div><label>Tarif Limbah (Rp)</label><input type="number" id="gen-waste" value="14000"></div>
                    <div><label>Wastewater Factor (%)</label><input type="number" id="gen-wfactor" value="85"></div>
                    <div><label>Invila WaaS Target (Rp)</label><input type="number" id="gen-waas" value="6000"></div>
                </div>
                <div><label>Target Recycling (%)</label><input type="number" id="gen-recycle" value="80"></div>
            </div>
        </div>

        <div class="mt-10 border-t border-white/10 pt-8 text-center">
            <button onclick="generateStrategicLink()" class="w-full md:w-auto px-10 bg-brandGold text-[#0A192F] py-4 rounded-xl font-black uppercase tracking-[0.15em] text-sm hover:bg-white active:scale-95 transition-all shadow-[0_0_20px_rgba(197,160,89,0.4)]">
                ⚙️ Generate Trojan Link
            </button>
        </div>

        <div id="result-box" class="hidden mt-8 bg-successGreen/10 border border-successGreen p-6 rounded-xl text-center transition-all">
            <p class="text-[10px] font-bold text-successGreen uppercase tracking-widest mb-3">Tautan Berhasil Dirakit! (Klik Untuk Menyalin)</p>
            <div onclick="copyToClipboard()" class="bg-[#081221] p-4 rounded border border-slate-700 cursor-pointer hover:border-successGreen transition-colors group relative overflow-hidden break-all">
                <p id="final-link" class="font-mono text-sm text-slate-300 group-hover:text-white relative z-10"></p>
                <div class="absolute inset-0 bg-successGreen/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            </div>
            <p id="copy-msg" class="text-[10px] font-bold text-brandGold uppercase tracking-widest mt-3 hidden">✅ Tautan Disalin ke Clipboard!</p>
        </div>

    </div>

    <script>
        function generateStrategicLink() {
            // Ambil Base URL (Diasumsikan berada di folder yang sama dengan index.html)
            const baseUrl = window.location.href.replace('generator.html', 'index.html');
            const params = new URLSearchParams();

            // Intelijen
            const client = document.getElementById('gen-client').value;
            const nama = document.getElementById('gen-nama').value;
            const role = document.getElementById('gen-role').value;
            const view = document.getElementById('gen-view').value;
            
            if(client) params.append('client', encodeURIComponent(client.replace(/ /g, '_')));
            if(nama) params.append('nama', encodeURIComponent(nama.replace(/ /g, '_')));
            if(role) params.append('role', encodeURIComponent(role.replace(/ /g, '_')));
            params.append('view', view);

            // Parameter Teknis
            params.append('flow', document.getElementById('gen-flow').value);
            params.append('pdam', document.getElementById('gen-pdam').value);
            params.append('waste', document.getElementById('gen-waste').value);
            params.append('wfactor', document.getElementById('gen-wfactor').value);
            params.append('recycle', document.getElementById('gen-recycle').value);
            params.append('waas', document.getElementById('gen-waas').value);
            params.append('days', document.getElementById('gen-days').value);

            // Time Bomb
            const expireHours = parseInt(document.getElementById('gen-expire').value);
            if(expireHours > 0) {
                const expireTimestamp = Date.now() + (expireHours * 60 * 60 * 1000);
                params.append('expire', expireTimestamp);
            }

            // Susun Final URL
            const finalUrl = `${baseUrl}?${params.toString()}`;
            
            // Tampilkan ke UI
            const resBox = document.getElementById('result-box');
            document.getElementById('final-link').innerText = finalUrl;
            resBox.classList.remove('hidden');
        }

        function copyToClipboard() {
            const linkText = document.getElementById('final-link').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 3000);
            });
        }
    </script>
</body>
</html>
